<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班级吐槽墙 💬</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    /* ─── 登录页 ─── */
    #login-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }

    .login-bg-decoration {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .login-bg-decoration::before,
    .login-bg-decoration::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,.1);
    }

    .login-bg-decoration::before {
      width: 400px; height: 400px;
      top: -100px; right: -100px;
    }

    .login-bg-decoration::after {
      width: 300px; height: 300px;
      bottom: -80px; left: -80px;
    }

    .login-card {
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 80px rgba(0,0,0,.3);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .login-card .logo { 
      font-size: 72px; 
      margin-bottom: 16px;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .login-card h1 { 
      font-size: 28px; 
      color: #1a1a2e; 
      margin-bottom: 8px;
      font-weight: 700;
    }

    .login-card p { 
      font-size: 14px; 
      color: #666; 
      margin-bottom: 32px;
    }

    .login-card input {
      width: 100%; 
      padding: 16px 20px;
      border: 2px solid #e8e8e8; 
      border-radius: 16px;
      font-size: 16px; 
      outline: none; 
      transition: all .3s;
      margin-bottom: 16px;
      background: #f8f9fa;
    }

    .login-card input:focus { 
      border-color: #667eea;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(102,126,234,.15);
    }

    .login-card button {
      width: 100%; 
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff; 
      border: none; 
      border-radius: 16px;
      font-size: 17px; 
      font-weight: 600; 
      cursor: pointer;
      transition: all .3s;
      box-shadow: 0 8px 25px rgba(102,126,234,.4);
    }

    .login-card button:hover { 
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(102,126,234,.5);
    }

    .login-tip { 
      margin-top: 24px; 
      font-size: 13px; 
      color: rgba(255,255,255,.9);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .login-tip span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ─── 主界面 ─── */
    #app-page { display: none; }

    /* 顶部导航 */
    .topbar {
      position: sticky; 
      top: 0; 
      z-index: 100;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(20px);
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      padding: 0 20px; 
      height: 64px;
      border-bottom: 1px solid rgba(255,255,255,.2);
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
    }

    .topbar-title { 
      font-size: 20px; 
      font-weight: 700; 
      color: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topbar-right { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
    }

    .user-chip {
      display: flex; 
      align-items: center; 
      gap: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 24px; 
      padding: 6px 14px;
      font-size: 13px; 
      color: #fff; 
      font-weight: 600;
    }

    .user-chip .avatar-sm {
      width: 26px; 
      height: 26px; 
      border-radius: 50%;
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-size: 12px; 
      font-weight: 700; 
      color: #fff;
      background: rgba(255,255,255,.2);
    }

    .logout-btn {
      background: rgba(255,255,255,.1);
      border: none; 
      border-radius: 12px;
      padding: 8px 16px; 
      font-size: 13px; 
      color: #666; 
      cursor: pointer;
      transition: all .3s;
    }

    .logout-btn:hover { 
      background: #fee;
      color: #e74c3c;
    }

    /* 发帖框 */
    .compose-area {
      background: rgba(255,255,255,.98);
      backdrop-filter: blur(20px);
      margin: 16px; 
      border-radius: 24px;
      padding: 20px; 
      box-shadow: 0 10px 40px rgba(0,0,0,.15);
    }

    .compose-header { 
      display: flex; 
      align-items: flex-start; 
      gap: 14px; 
    }

    .avatar {
      width: 48px; 
      height: 48px; 
      border-radius: 14px;
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-size: 20px; 
      font-weight: 700; 
      color: #fff; 
      flex-shrink: 0;
      box-shadow: 0 4px 15px rgba(0,0,0,.2);
    }

    .compose-body { flex: 1; }

    .compose-body textarea {
      width: 100%; 
      border: none; 
      outline: none; 
      resize: none;
      font-size: 16px; 
      color: #333; 
      background: transparent;
      line-height: 1.6; 
      min-height: 70px; 
      font-family: inherit;
    }

    .compose-body textarea::placeholder { color: #aaa; }

    .compose-footer {
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      margin-top: 14px; 
      padding-top: 14px; 
      border-top: 1px solid #f0f0f0;
      flex-wrap: wrap;
      gap: 12px;
    }

    .teacher-select {
      display: flex; 
      align-items: center; 
      gap: 10px; 
      flex-wrap: wrap;
    }

    .teacher-select label { 
      font-size: 14px; 
      color: #666;
      font-weight: 500;
    }

    .teacher-select select {
      border: 2px solid #e8e8e8; 
      border-radius: 12px;
      padding: 8px 14px; 
      font-size: 14px; 
      outline: none;
      background: #f8f9fa; 
      cursor: pointer;
      transition: all .3s;
      font-family: inherit;
    }

    .teacher-select select:focus { 
      border-color: #667eea;
      background: #fff;
    }

    .add-teacher-btn {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: #fff;
      border: none; 
      border-radius: 12px;
      padding: 8px 16px; 
      font-size: 13px; 
      cursor: pointer;
      transition: all .3s;
      font-weight: 500;
    }

    .add-teacher-btn:hover { 
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(245,87,108,.4);
    }

    .post-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff; 
      border: none; 
      border-radius: 14px;
      padding: 10px 28px; 
      font-size: 15px; 
      font-weight: 600;
      cursor: pointer; 
      transition: all .3s;
      box-shadow: 0 6px 20px rgba(102,126,234,.4);
    }

    .post-btn:hover { 
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102,126,234,.5);
    }

    .post-btn:disabled { 
      opacity: .5; 
      cursor: not-allowed;
      transform: none;
    }

    /* 语音按钮 */
    .voice-btn {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: #fff;
      border: none; 
      border-radius: 14px;
      padding: 10px 18px; 
      font-size: 15px; 
      font-weight: 600;
      cursor: pointer; 
      transition: all .3s;
      box-shadow: 0 6px 20px rgba(56,239,125,.4);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .voice-btn:hover { 
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(56,239,125,.5);
    }

    .voice-btn.recording {
      background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
      box-shadow: 0 6px 20px rgba(235,51,73,.5);
      animation: voicePulse 1s ease infinite;
    }

    @keyframes voicePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .voice-btn .mic-icon {
      font-size: 18px;
    }

    .voice-btn.recording .mic-icon {
      animation: micBounce .5s ease infinite;
    }

    @keyframes micBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    /* 评论区语音 */
    .comment-voice-btn {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: #fff;
      border: none; 
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 16px;
      cursor: pointer; 
      transition: all .3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .comment-voice-btn:hover { 
      transform: scale(1.1);
    }

    .comment-voice-btn.recording {
      background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
      animation: voicePulse 1s ease infinite;
    }

    /* 语音不支持提示 */
    .voice-unsupported {
      font-size: 12px;
      color: #999;
      padding: 8px 0;
    }

    /* 老师标签 */
    .teacher-tag {
      display: inline-flex; 
      align-items: center; 
      gap: 4px;
      background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
      color: #fff;
      border-radius: 8px; 
      padding: 4px 10px; 
      font-size: 12px;
      font-weight: 600; 
      margin-right: 6px;
      box-shadow: 0 2px 8px rgba(250,112,154,.3);
    }

    /* 帖子列表 */
    .feed { 
      padding: 0 16px 100px; 
      max-width: 680px;
      margin: 0 auto;
    }

    .empty-hint {
      text-align: center; 
      padding: 80px 20px;
      color: rgba(255,255,255,.9);
      font-size: 15px;
    }

    .empty-hint .big { 
      font-size: 80px; 
      margin-bottom: 20px;
      animation: bounce 2s ease-in-out infinite;
    }

    /* 单条帖子 */
    .post-card {
      background: rgba(255,255,255,.98);
      backdrop-filter: blur(20px);
      border-radius: 24px; 
      margin-bottom: 16px;
      padding: 20px; 
      box-shadow: 0 10px 40px rgba(0,0,0,.12);
      animation: slideUp .4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .post-header { 
      display: flex; 
      align-items: flex-start; 
      gap: 14px; 
    }

    .post-meta { flex: 1; }

    .post-name { 
      font-size: 15px; 
      font-weight: 700; 
      color: #667eea; 
    }

    .post-time { 
      font-size: 12px; 
      color: #999; 
      margin-top: 3px; 
    }

    .post-content {
      font-size: 15px; 
      color: #333; 
      line-height: 1.8;
      margin: 14px 0;
    }

    .post-footer {
      display: flex; 
      align-items: center; 
      gap: 20px;
      padding-top: 14px; 
      border-top: 1px solid #f5f5f5;
    }

    .action-btn {
      display: flex; 
      align-items: center; 
      gap: 6px;
      background: none; 
      border: none; 
      cursor: pointer;
      font-size: 14px; 
      color: #888; 
      transition: all .3s;
      padding: 8px 12px;
      border-radius: 12px;
    }

    .action-btn:hover { 
      background: #f8f9fa;
      color: #667eea;
    }

    .action-btn.liked { 
      color: #e91e63 !important;
      background: #fce4ec;
    }

    .action-btn .icon { font-size: 18px; }

    /* 评论区 */
    .comment-section { 
      margin-top: 14px; 
      display: none; 
      background: #f8f9fa;
      border-radius: 16px;
      padding: 16px;
    }

    .comment-section.open { display: block; }

    .comment-list { margin-bottom: 12px; }

    .comment-item {
      display: flex; 
      align-items: flex-start; 
      gap: 10px;
      padding: 10px 0; 
      border-bottom: 1px solid #eee;
    }

    .comment-item:last-child { border-bottom: none; }

    .comment-item .avatar-xs {
      width: 32px; 
      height: 32px; 
      border-radius: 10px;
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-size: 13px; 
      font-weight: 700; 
      color: #fff; 
      flex-shrink: 0;
    }

    .comment-item .c-body { flex: 1; }

    .comment-item .c-name { 
      font-size: 13px; 
      font-weight: 600; 
      color: #667eea; 
    }

    .comment-item .c-text { 
      font-size: 14px; 
      color: #444; 
      margin-top: 4px; 
      line-height: 1.6; 
    }

    .comment-item .c-time { 
      font-size: 11px; 
      color: #bbb; 
      margin-top: 4px; 
    }

    .comment-input-row {
      display: flex; 
      gap: 10px; 
      margin-top: 12px;
    }

    .comment-input-row input {
      flex: 1; 
      border: 2px solid #e8e8e8; 
      border-radius: 24px;
      padding: 10px 18px; 
      font-size: 14px; 
      outline: none;
      transition: all .3s; 
      font-family: inherit;
    }

    .comment-input-row input:focus { 
      border-color: #667eea;
    }

    .comment-input-row button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff; 
      border: none; 
      border-radius: 24px;
      padding: 10px 20px; 
      font-size: 14px; 
      cursor: pointer;
      transition: all .3s;
      font-weight: 500;
    }

    .comment-input-row button:hover { 
      transform: scale(1.05);
    }

    /* 点赞列表 */
    .like-names {
      font-size: 13px; 
      color: #e91e63;
      margin-top: 10px; 
      display: flex; 
      align-items: center; 
      gap: 6px; 
      flex-wrap: wrap;
      padding: 10px 14px;
      background: linear-gradient(135deg, #fff5f7 0%, #fff0f5 100%);
      border-radius: 12px;
    }

    .like-names .heart-icon { 
      font-size: 16px;
      animation: heartbeat 1s ease infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* 添加老师 modal */
    .modal-overlay {
      display: none; 
      position: fixed; 
      inset: 0;
      background: rgba(0,0,0,.5); 
      backdrop-filter: blur(8px);
      z-index: 200;
      align-items: center; 
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff; 
      border-radius: 24px; 
      padding: 32px;
      width: 90%;
      max-width: 360px; 
      box-shadow: 0 25px 80px rgba(0,0,0,.3);
    }

    .modal h3 { 
      font-size: 18px; 
      margin-bottom: 20px;
      text-align: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal input {
      width: 100%; 
      padding: 14px 18px; 
      border: 2px solid #e8e8e8;
      border-radius: 14px; 
      font-size: 15px; 
      outline: none;
      margin-bottom: 20px; 
      transition: all .3s; 
      font-family: inherit;
    }

    .modal input:focus { 
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102,126,234,.15);
    }

    .modal-footer { 
      display: flex; 
      gap: 12px; 
      justify-content: flex-end; 
    }

    .modal-footer button {
      padding: 12px 24px; 
      border-radius: 14px;
      font-size: 15px; 
      cursor: pointer; 
      border: none;
      transition: all .3s;
      font-weight: 500;
    }

    .btn-cancel { 
      background: #f5f5f5; 
      color: #666; 
    }

    .btn-confirm { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(102,126,234,.4);
    }

    .btn-confirm:hover { 
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102,126,234,.5);
    }

    /* 加载状态 */
    .loading-overlay {
      display: none; 
      position: fixed; 
      inset: 0;
      background: rgba(102,126,234,.95); 
      z-index: 300;
      align-items: center; 
      justify-content: center; 
      flex-direction: column;
    }

    .loading-overlay.open { display: flex; }

    .spinner {
      width: 50px; 
      height: 50px; 
      border: 4px solid rgba(255,255,255,.3);
      border-top-color: #fff; 
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { 
      margin-top: 16px; 
      font-size: 16px; 
      color: #fff;
      font-weight: 500;
    }

    /* 同步状态指示器 */
    .sync-indicator {
      position: fixed; 
      bottom: 24px; 
      right: 24px;
      background: rgba(255,255,255,.98);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 10px 18px; 
      font-size: 13px;
      box-shadow: 0 8px 30px rgba(0,0,0,.15);
      display: flex; 
      align-items: center; 
      gap: 8px;
      transition: all .3s; 
      opacity: 0; 
      transform: translateY(20px);
    }

    .sync-indicator.show { 
      opacity: 1; 
      transform: translateY(0); 
    }

    .sync-indicator.syncing { color: #667eea; }
    .sync-indicator.success { color: #2ecc71; }
    .sync-indicator.error { color: #e74c3c; }

    .sync-dot {
      width: 10px; 
      height: 10px; 
      border-radius: 50%;
      background: currentColor; 
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse { 
      0%,100% { opacity: 1; transform: scale(1); } 
      50% { opacity: .5; transform: scale(.8); } 
    }

    /* 响应式 */
    @media (max-width: 480px) {
      .login-card { 
        padding: 36px 28px; 
      }

      .topbar { padding: 0 16px; }

      .compose-area { margin: 12px; padding: 16px; }

      .post-card { padding: 16px; }

      .post-footer { gap: 12px; }

      .action-btn { 
        padding: 6px 10px;
        font-size: 13px; 
      }
    }

    /* 滚动条美化 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.3); border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.5); }
  </style>
</head>
<body>

<!-- ────────────── 登录页 ────────────── -->
<div id="login-page">
  <div class="login-bg-decoration"></div>
  <div class="login-card">
    <div class="logo">😤</div>
    <h1>班级吐槽墙</h1>
    <p>有什么不爽？说出来让大家开心一下！</p>
    <input type="text" id="username-input" placeholder="输入你的昵称就能进入" maxlength="20" />
    <button onclick="doLogin()">🚀 进入吐槽墙</button>
  </div>
  <div class="login-tip">
    <span>🌐 云端同步</span>
    <span>·</span>
    <span>👥 全班共享</span>
    <span>·</span>
    <span>⚡ 实时更新</span>
  </div>
</div>

<!-- ────────────── 主应用 ────────────── -->
<div id="app-page">
  <!-- 顶部导航 -->
  <div class="topbar">
    <div class="topbar-title">😤 班级吐槽墙</div>
    <div class="topbar-right">
      <div class="user-chip">
        <div class="avatar-sm" id="topbar-avatar"></div>
        <span id="topbar-username"></span>
      </div>
      <button class="logout-btn" onclick="doLogout()">退出</button>
    </div>
  </div>

  <!-- 发帖区 -->
  <div class="compose-area">
    <div class="compose-header">
      <div class="avatar" id="compose-avatar"></div>
      <div class="compose-body">
        <textarea id="compose-text" placeholder="今天被哪位老师整了？吐槽一下吧 💬" rows="3"></textarea>
      </div>
    </div>
    <div class="compose-footer">
      <div class="teacher-select">
        <label>🎯</label>
        <select id="teacher-select">
          <option value="">选择老师（可选）</option>
        </select>
        <button class="add-teacher-btn" onclick="openAddTeacher()">＋ 添加老师</button>
      </div>
      <div style="display: flex; align-items: center; gap: 10px;">
        <button class="voice-btn" id="post-voice-btn" onclick="togglePostVoice()">
          <span class="mic-icon">🎤</span>
          <span id="post-voice-text">语音</span>
        </button>
        <button class="post-btn" id="post-btn" onclick="submitPost()">发布</button>
      </div>
    </div>
  </div>

  <!-- 帖子流 -->
  <div class="feed" id="feed"></div>
</div>

<!-- 添加老师 Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>✨ 添加老师</h3>
    <input type="text" id="new-teacher-input" placeholder="例如：数学老师王老师" maxlength="20" />
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-confirm" onclick="confirmAddTeacher()">添加</button>
    </div>
  </div>
</div>

<!-- 加载遮罩 -->
<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">正在加载...</div>
</div>

<!-- 同步状态指示器 -->
<div class="sync-indicator" id="sync-indicator">
  <div class="sync-dot"></div>
  <span id="sync-text">同步中...</span>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// 班级吐槽墙 - 云端共享版 (美化版)
// ─────────────────────────────────────────────────────────────

const CONFIG = {
  BIN_ID: '67e9a4e88561e97a50f7e2b7',
  API_KEY: '',
  BASE_URL: 'https://api.jsonbin.io/v3/b',
  POLL_INTERVAL: 5000,
  MAX_RETRY: 3
};

// ─── 本地存储 ───
const USER_KEY = 'class_rant_user_v3';

function getUser() {
  return localStorage.getItem(USER_KEY) || '';
}
function saveUser(u) {
  localStorage.setItem(USER_KEY, u);
}

// ─── 内存数据缓存 ───
let cacheData = { posts: [], teachers: ["语文老师","数学老师","英语老师","物理老师","化学老师","生物老师","历史老师","政治老师","体育老师","班主任"] };
let lastFetchTime = 0;
let isSyncing = false;

// ─── 颜色系统 ───
const COLORS = [
  '#667eea','#764ba2','#f093fb','#4facfe',
  '#43e97b','#fa709a','#a8edea','#ff9a9e',
  '#ffecd2','#c471f5'
];

function colorOf(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffffff;
  return COLORS[Math.abs(h) % COLORS.length];
}

function initials(name) {
  return name ? name[0].toUpperCase() : '?';
}

// ─── 时间格式化 ───
function formatTime(ts) {
  const d = new Date(ts), now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff/60) + '分钟前';
  if (diff < 86400) return Math.floor(diff/3600) + '小时前';
  if (diff < 86400*3) return Math.floor(diff/86400) + '天前';
  return `${d.getMonth()+1}月${d.getDate()}日 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ═════════════════════════════════════════════════════════════
// 云端数据操作
// ═════════════════════════════════════════════════════════════

async function fetchCloudData() {
  try {
    showSyncStatus('syncing', '同步中...');
    const res = await fetch(`${CONFIG.BASE_URL}/${CONFIG.BIN_ID}/latest`, {
      headers: { 'X-Bin-Meta': 'false' }
    });
    if (!res.ok) throw new Error('Fetch failed: ' + res.status);
    const result = await res.json();
    const data = result.record || result;
    cacheData = { ...cacheData, ...data };
    lastFetchTime = Date.now();
    showSyncStatus('success', '已同步');
    return cacheData;
  } catch (e) {
    console.error('Fetch error:', e);
    showSyncStatus('error', '同步失败');
    return cacheData;
  }
}

async function saveCloudData(data, retry = 0) {
  if (isSyncing) {
    await new Promise(r => setTimeout(r, 500));
    return saveCloudData(data, retry);
  }
  
  isSyncing = true;
  showSyncStatus('syncing', '保存中...');
  
  try {
    const latest = await fetchCloudData();
    const localPosts = data.posts || [];
    const cloudPosts = latest.posts || [];
    
    const postMap = new Map();
    [...cloudPosts, ...localPosts].forEach(p => {
      const existing = postMap.get(p.id);
      if (!existing || p.ts > existing.ts) {
        postMap.set(p.id, p);
      }
    });
    
    const allTeachers = [...new Set([...(latest.teachers || []), ...(data.teachers || [])])];
    
    const mergedData = {
      posts: Array.from(postMap.values()).sort((a, b) => b.ts - a.ts),
      teachers: allTeachers
    };
    
    const res = await fetch(`${CONFIG.BASE_URL}/${CONFIG.BIN_ID}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Bin-Meta': 'false'
      },
      body: JSON.stringify(mergedData)
    });
    
    if (!res.ok) throw new Error('Save failed: ' + res.status);
    
    cacheData = mergedData;
    showSyncStatus('success', '已保存');
    return mergedData;
  } catch (e) {
    console.error('Save error:', e);
    showSyncStatus('error', '保存失败');
    if (retry < CONFIG.MAX_RETRY) {
      await new Promise(r => setTimeout(r, 1000 * (retry + 1)));
      isSyncing = false;
      return saveCloudData(data, retry + 1);
    }
    throw e;
  } finally {
    isSyncing = false;
  }
}

// ═════════════════════════════════════════════════════════════
// UI 状态显示
// ═════════════════════════════════════════════════════════════

function showLoading(show) {
  document.getElementById('loading-overlay').classList.toggle('open', show);
}

function showSyncStatus(type, text) {
  const el = document.getElementById('sync-indicator');
  const txt = document.getElementById('sync-text');
  el.className = 'sync-indicator show ' + type;
  txt.textContent = text;
  
  if (type === 'success') {
    setTimeout(() => el.classList.remove('show'), 2000);
  }
}

// ═════════════════════════════════════════════════════════════
// 登录/退出
// ═════════════════════════════════════════════════════════════

async function doLogin() {
  const name = document.getElementById('username-input').value.trim();
  if (!name) { shake('username-input'); return; }
  saveUser(name);
  await enterApp(name);
}

function doLogout() {
  if (!confirm('确定退出登录吗？')) return;
  saveUser('');
  if (window.pollInterval) clearInterval(window.pollInterval);
  document.getElementById('app-page').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('username-input').value = '';
}

function shake(id) {
  const el = document.getElementById(id);
  el.style.animation = 'none';
  el.style.borderColor = '#e74c3c';
  setTimeout(() => el.style.borderColor = '', 800);
}

// ═════════════════════════════════════════════════════════════
// 进入应用
// ═════════════════════════════════════════════════════════════

async function enterApp(name) {
  showLoading(true);
  await fetchCloudData();
  
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app-page').style.display = 'block';
  
  const av = document.getElementById('topbar-avatar');
  av.textContent = initials(name);
  av.style.background = colorOf(name);
  document.getElementById('topbar-username').textContent = name;
  
  const cav = document.getElementById('compose-avatar');
  cav.textContent = initials(name);
  cav.style.background = colorOf(name);
  
  refreshTeacherSelect();
  renderFeed();
  
  showLoading(false);
  
  if (window.pollInterval) clearInterval(window.pollInterval);
  window.pollInterval = setInterval(async () => {
    const oldCount = cacheData.posts.length;
    await fetchCloudData();
    if (cacheData.posts.length !== oldCount) {
      renderFeed();
    }
  }, CONFIG.POLL_INTERVAL);
}

// ═════════════════════════════════════════════════════════════
// 老师管理
// ═════════════════════════════════════════════════════════════

function refreshTeacherSelect() {
  const sel = document.getElementById('teacher-select');
  const prev = sel.value;
  sel.innerHTML = '<option value="">选择老师（可选）</option>';
  (cacheData.teachers || []).forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    if (t === prev) o.selected = true;
    sel.appendChild(o);
  });
}

function openAddTeacher() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('new-teacher-input').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('new-teacher-input').value = '';
}

async function confirmAddTeacher() {
  const name = document.getElementById('new-teacher-input').value.trim();
  if (!name) return;
  
  if (!cacheData.teachers.includes(name)) {
    cacheData.teachers.push(name);
    await saveCloudData(cacheData);
    refreshTeacherSelect();
    document.getElementById('teacher-select').value = name;
  }
  closeModal();
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

document.getElementById('new-teacher-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmAddTeacher();
});

// ═════════════════════════════════════════════════════════════
// 发帖
// ═════════════════════════════════════════════════════════════

async function submitPost() {
  const text = document.getElementById('compose-text').value.trim();
  const teacher = document.getElementById('teacher-select').value;
  if (!text) { alert('写点什么再发嘛 🥺'); return; }
  
  const btn = document.getElementById('post-btn');
  btn.disabled = true;
  btn.textContent = '发布中...';
  
  try {
    const post = {
      id: Date.now().toString(),
      author: getUser(),
      text, teacher,
      ts: Date.now(),
      likes: [],
      comments: []
    };
    
    cacheData.posts.unshift(post);
    await saveCloudData(cacheData);
    
    document.getElementById('compose-text').value = '';
    document.getElementById('teacher-select').value = '';
    renderFeed();
    showToast('发布成功！🎉');
  } catch (e) {
    alert('发布失败，请重试');
  } finally {
    btn.disabled = false;
    btn.textContent = '发布';
  }
}

// ═════════════════════════════════════════════════════════════
// 渲染帖子
// ═════════════════════════════════════════════════════════════

function renderFeed() {
  const feed = document.getElementById('feed');
  if (!cacheData.posts.length) {
    feed.innerHTML = '<div class="empty-hint"><div class="big">🫙</div>还没有人发帖<br>成为第一个发帖的人吧！</div>';
    return;
  }
  feed.innerHTML = cacheData.posts.map(p => renderPost(p)).join('');
}

function renderPost(p) {
  const me = getUser();
  const liked = p.likes && p.likes.includes(me);
  const likeNames = (p.likes && p.likes.length)
    ? `<div class="like-names"><span class="heart-icon">❤️</span>${p.likes.join('、')} 觉得很解气</div>`
    : '';
  const teacherTag = p.teacher
    ? `<span class="teacher-tag">🎯 ${p.teacher}</span>`
    : '';
  const commentsHtml = (p.comments || []).map(c => `
    <div class="comment-item">
      <div class="avatar-xs" style="background:${colorOf(c.author)}">${initials(c.author)}</div>
      <div class="c-body">
        <div class="c-name">${esc(c.author)}</div>
        <div class="c-text">${esc(c.text)}</div>
        <div class="c-time">${formatTime(c.ts)}</div>
      </div>
    </div>`).join('');

  return `
<div class="post-card" id="post-${p.id}">
  <div class="post-header">
    <div class="avatar" style="background:${colorOf(p.author)}">${initials(p.author)}</div>
    <div class="post-meta">
      <div class="post-name">${esc(p.author)}</div>
      <div class="post-time">${formatTime(p.ts)}</div>
    </div>
  </div>
  <div class="post-content">${teacherTag}${esc(p.text)}</div>
  ${likeNames}
  <div class="post-footer">
    <button class="action-btn ${liked?'liked':''}" onclick="toggleLike('${p.id}')">
      <span class="icon">${liked?'❤️':'🤍'}</span>
      <span>${p.likes && p.likes.length ? p.likes.length : ''} 顶</span>
    </button>
    <button class="action-btn" onclick="toggleComment('${p.id}')">
      <span class="icon">💬</span>
      <span>${p.comments && p.comments.length ? p.comments.length : ''} 评论</span>
    </button>
    <button class="action-btn" onclick="sharePost('${p.id}')">
      <span class="icon">📢</span>
      <span>分享</span>
    </button>
  </div>
  <div class="comment-section" id="cs-${p.id}">
    <div class="comment-list">${commentsHtml}</div>
    <div class="comment-input-row">
      <input id="ci-${p.id}" type="text" placeholder="说两句…" maxlength="200"
             onkeydown="if(event.key==='Enter')submitComment('${p.id}')" />
      <button class="comment-voice-btn" id="cv-${p.id}" onclick="toggleCommentVoice('${p.id}')" title="语音输入">🎤</button>
      <button onclick="submitComment('${p.id}')">发送</button>
    </div>
  </div>
</div>`;
}

// ═════════════════════════════════════════════════════════════
// 点赞
// ═════════════════════════════════════════════════════════════

async function toggleLike(pid) {
  const me = getUser(); if (!me) return;
  
  const p = cacheData.posts.find(x => x.id === pid);
  if (!p) return;
  
  if (!p.likes) p.likes = [];
  const idx = p.likes.indexOf(me);
  if (idx >= 0) p.likes.splice(idx, 1);
  else p.likes.push(me);
  
  try {
    await saveCloudData(cacheData);
    const el = document.getElementById('post-' + pid);
    if (el) el.outerHTML = renderPost(p);
  } catch (e) {
    showToast('操作失败，请重试');
  }
}

// ═════════════════════════════════════════════════════════════
// 评论
// ═════════════════════════════════════════════════════════════

function toggleComment(pid) {
  const cs = document.getElementById('cs-' + pid);
  if (!cs) return;
  cs.classList.toggle('open');
  if (cs.classList.contains('open')) {
    setTimeout(() => document.getElementById('ci-' + pid)?.focus(), 100);
  }
}

async function submitComment(pid) {
  const me = getUser(); if (!me) return;
  const input = document.getElementById('ci-' + pid); if (!input) return;
  const text = input.value.trim(); if (!text) return;
  
  const p = cacheData.posts.find(x => x.id === pid);
  if (!p) return;
  
  if (!p.comments) p.comments = [];
  p.comments.push({ author: me, text, ts: Date.now() });
  
  try {
    await saveCloudData(cacheData);
    input.value = '';
    const cs = document.getElementById('cs-' + pid);
    const wasOpen = cs?.classList.contains('open');
    const el = document.getElementById('post-' + pid);
    if (el) el.outerHTML = renderPost(p);
    if (wasOpen) {
      document.getElementById('cs-' + pid)?.classList.add('open');
    }
  } catch (e) {
    showToast('评论失败，请重试');
  }
}

// ═════════════════════════════════════════════════════════════
// 分享
// ═════════════════════════════════════════════════════════════

function sharePost(pid) {
  const p = cacheData.posts.find(x => x.id === pid);
  if (!p) return;
  const text = `【班级吐槽墙】${p.author}：${p.teacher?'['+p.teacher+'] ':''}${p.text}`;
  if (navigator.share) {
    navigator.share({ title: '班级吐槽墙', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板 📋')).catch(() => {});
  }
}

// ═════════════════════════════════════════════════════════════
// 语音识别
// ═════════════════════════════════════════════════════════════

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let postRecognition = null;
let commentRecognition = null;
let currentCommentId = null;

function isSpeechSupported() {
  return !!SpeechRecognition;
}

function initPostRecognition() {
  if (!isSpeechSupported()) return null;
  
  const recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'zh-CN';
  
  recognition.onresult = (event) => {
    let finalTranscript = '';
    let interimTranscript = '';
    
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalTranscript += transcript;
      } else {
        interimTranscript += transcript;
      }
    }
    
    const textarea = document.getElementById('compose-text');
    if (finalTranscript) {
      textarea.value += finalTranscript;
    }
    // 显示实时识别结果
    if (interimTranscript) {
      textarea.placeholder = interimTranscript;
    } else {
      textarea.placeholder = '今天被哪位老师整了？吐槽一下吧 💬';
    }
  };
  
  recognition.onerror = (event) => {
    console.error('Speech recognition error:', event.error);
    if (event.error !== 'no-speech' && event.error !== 'aborted') {
      showToast('语音识别出错: ' + event.error);
    }
    stopPostVoice();
  };
  
  recognition.onend = () => {
    // 如果还在录音状态，自动重启
    if (document.getElementById('post-voice-btn').classList.contains('recording')) {
      try {
        recognition.start();
      } catch (e) {
        stopPostVoice();
      }
    }
  };
  
  return recognition;
}

function togglePostVoice() {
  const btn = document.getElementById('post-voice-btn');
  const textEl = document.getElementById('post-voice-text');
  const textarea = document.getElementById('compose-text');
  
  if (!isSpeechSupported()) {
    showToast('您的浏览器不支持语音识别，请使用 Chrome 或 Edge 浏览器');
    return;
  }
  
  if (btn.classList.contains('recording')) {
    stopPostVoice();
  } else {
    // 开始录音
    if (!postRecognition) {
      postRecognition = initPostRecognition();
    }
    
    try {
      postRecognition.start();
      btn.classList.add('recording');
      textEl.textContent = '停止';
      textarea.placeholder = '正在听你说…';
      showToast('开始语音输入，说完点击"停止"');
    } catch (e) {
      showToast('启动语音失败，请刷新页面重试');
    }
  }
}

function stopPostVoice() {
  const btn = document.getElementById('post-voice-btn');
  const textEl = document.getElementById('post-voice-text');
  const textarea = document.getElementById('compose-text');
  
  if (postRecognition) {
    try {
      postRecognition.stop();
    } catch (e) {}
  }
  
  btn.classList.remove('recording');
  textEl.textContent = '语音';
  textarea.placeholder = '今天被哪位老师整了？吐槽一下吧 💬';
}

function toggleCommentVoice(postId) {
  const btn = document.getElementById('cv-' + postId);
  const input = document.getElementById('ci-' + postId);
  
  if (!isSpeechSupported()) {
    showToast('您的浏览器不支持语音识别，请使用 Chrome 或 Edge 浏览器');
    return;
  }
  
  if (btn.classList.contains('recording')) {
    stopCommentVoice();
  } else {
    // 先停止其他录音
    if (commentRecognition) {
      stopCommentVoice();
    }
    
    // 创建新的识别实例
    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'zh-CN';
    currentCommentId = postId;
    
    recognition.onresult = (event) => {
      let finalTranscript = '';
      
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          finalTranscript += transcript;
        }
      }
      
      if (finalTranscript) {
        input.value += finalTranscript;
      }
    };
    
    recognition.onerror = (event) => {
      if (event.error !== 'no-speech' && event.error !== 'aborted') {
        showToast('语音识别出错');
      }
      stopCommentVoice();
    };
    
    recognition.onend = () => {
      if (btn.classList.contains('recording')) {
        try {
          recognition.start();
        } catch (e) {
          stopCommentVoice();
        }
      }
    };
    
    commentRecognition = recognition;
    
    try {
      recognition.start();
      btn.classList.add('recording');
      input.placeholder = '正在听你说…';
      showToast('开始语音输入');
    } catch (e) {
      showToast('启动语音失败');
    }
  }
}

function stopCommentVoice() {
  const btn = document.getElementById('cv-' + currentCommentId);
  const input = document.getElementById('ci-' + currentCommentId);
  
  if (commentRecognition) {
    try {
      commentRecognition.stop();
    } catch (e) {}
    commentRecognition = null;
  }
  
  if (btn) btn.classList.remove('recording');
  if (input) input.placeholder = '说两句…';
  currentCommentId = null;
}
  let t = document.getElementById('__toast__');
  if (!t) {
    t = document.createElement('div');
    t.id = '__toast__';
    Object.assign(t.style, {
      position:'fixed', bottom:'90px', left:'50%', transform:'translateX(-50%)',
      background:'rgba(0,0,0,.8)', color:'#fff', padding:'12px 24px',
      borderRadius:'24px', fontSize:'14px', zIndex:'999',
      transition:'all .3s', backdropFilter:'blur(10px)'
    });
    document.body.appendChild(t);
  }
  t.textContent = msg; 
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(20px)';
  }, 2000);
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/\n/g,'<br>');
}

// ═════════════════════════════════════════════════════════════
// 初始化
// ═════════════════════════════════════════════════════════════

document.getElementById('username-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

(async function init() {
  const user = getUser();
  if (user) await enterApp(user);
})();
</script>
